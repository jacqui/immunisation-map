<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Australian Childhood Vaccination Rates</title>

    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <h1>How close is your community to the vaccination target?</h1>

    <p>
      Childhood vaccination rates vary across Australia. This map shows the
      proportion of children by selected age group who were fully vaccinated in
      each Statistical Area Level 3 (SA3). The
      <a
        href="https://www.health.gov.au/topics/immunisation/immunisation-data/childhood-immunisation-coverage#our-target"
      >
        national target is 95%</a
      >.
    </p>

    <label for="age">Age group:</label>

    <select id="age">
      <option>1 Year olds</option>
      <option selected>2 Year olds</option>
      <option>5 Year olds</option>
    </select>

    <div id="map"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
